services:
  spotify:
    build:
      context: .
      dockerfile: build/node/node-18/Dockerfile
    container_name: spotify-now-playing
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development