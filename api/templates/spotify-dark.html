<svg width="480" height="160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <foreignObject width="480" height="160">
        <div xmlns="http://www.w3.org/1999/xhtml" class="card">
            <style>
                * {
                    box-sizing: border-box;
                }

                .card {
                    position: relative;
                    width: 460px;
                    height: 140px;
                    margin: 10px;
                    padding: 18px 20px;
                    border-radius: 20px;
                    background: linear-gradient(155deg, #{{background_color}} 0%, #{{background_color_end}} 100%);
                    border: 1px solid #{{border_color}}55;
                    box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.04);
                    overflow: hidden;
                    display: flex;
                    align-items: center;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
                }

                #bars {
                    position: absolute;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    height: 28px;
                    display: flex;
                    align-items: flex-end;
                    overflow: hidden;
                    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 18%, black 82%, transparent 100%);
                    mask-image: linear-gradient(90deg, transparent 0%, black 18%, black 82%, transparent 100%);
                    opacity: 0.5;
                    z-index: 1;
                }

                .bar {
                    width: 3px;
                    margin-right: 1px;
                    border-radius: 2px 2px 0 0;
                    background: linear-gradient(180deg, #1ed760 0%, rgba(29, 185, 84, 0) 100%);
                    position: absolute;
                    bottom: 0;
                    animation: sound 0ms -800ms linear infinite alternate;
                }

                @keyframes sound {
                    0% {
                        height: 3px;
                        opacity: .3;
                    }

                    100% {
                        height: 22px;
                        opacity: .85;
                    }
                }

                .brand {
                    position: absolute;
                    right: 18px;
                    top: 18px;
                    width: 18px;
                    height: 18px;
                    opacity: 1;
                    z-index: 2;
                }

                .row {
                    position: relative;
                    z-index: 2;
                    display: flex;
                    align-items: center;
                    gap: 16px;
                    width: 100%;
                }

                .cover {
                    flex: none;
                    width: 88px;
                    height: 88px;
                    border-radius: 14px;
                    background-color: rgba(255, 255, 255, 0.06);
                    background-size: cover;
                    background-position: center;
                    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(29, 185, 84, 0.25);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: rgba(255, 255, 255, 0.22);
                    font-size: 26px;
                }

                .info {
                    flex: 1;
                    min-width: 0;
                }

                .pill {
                    align-items: center;
                    gap: 6px;
                    padding: 3px 10px 3px 8px;
                    border-radius: 100px;
                    background: rgba(29, 185, 84, 0.14);
                    color: #1ed760;
                    font-size: 10px;
                    font-weight: 700;
                    letter-spacing: 0.06em;
                    text-transform: uppercase;
                    margin-bottom: 9px;
                }

                .dot {
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    background: #1ed760;
                    display: inline-block;
                }

                .dot-live {
                    animation: pulse 1.4s ease-in-out infinite;
                }

                .dot-idle {
                    background: #8a8a8a;
                }

                @keyframes pulse {
                    0%, 100% {
                        box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.55);
                    }

                    50% {
                        box-shadow: 0 0 0 4px rgba(29, 185, 84, 0);
                    }
                }

                .song {
                    color: #f5f5f5;
                    font-size: 19px;
                    font-weight: 700;
                    line-height: 1.3;
                    overflow: hidden;
                    white-space: nowrap;
                    text-overflow: ellipsis;
                }

                .artist {
                    margin-top: 4px;
                    color: #a3a3a3;
                    font-size: 14px;
                    font-weight: 500;
                    overflow: hidden;
                    white-space: nowrap;
                    text-overflow: ellipsis;
                }

                .progress {
                    align-items: center;
                    gap: 8px;
                    margin-top: 12px;
                }

                .progress-track {
                    flex: 1;
                    height: 4px;
                    border-radius: 100px;
                    background: rgba(255, 255, 255, 0.1);
                    overflow: hidden;
                }

                .progress-fill {
                    height: 100%;
                    width: {{progressPercent}}%;
                    border-radius: 100px;
                    background: linear-gradient(90deg, #1ed760, #1DB954);
                }

                .time {
                    color: #7a7a7a;
                    font-size: 10px;
                    font-variant-numeric: tabular-nums;
                }

                a {
                    text-decoration: none;
                }

                {{barCSS}}
            </style>

            <div id="bars">{{contentBar}}</div>

            <a class="brand" href="{{songURI}}" target="_blank">
                <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#1ed760"><title>Spotify</title><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            </a>

            <div class="row">
                <a href="{{songURI}}" target="_blank">
                    <div class="cover" style="background-image:url('data:image/png;base64,{{image}}')">♪</div>
                </a>

                <div class="info">
                    <div class="pill" style="display:{{statusPillDisplay}}"><span class="dot {{statusDotClass}}"></span> {{status}}</div>

                    <a href="{{songURI}}" target="_blank">
                        <div class="song">{{songName}}</div>
                    </a>
                    <a href="{{artistURI}}" target="_blank">
                        <div class="artist">{{artistName}}</div>
                    </a>

                    <div class="progress" style="display:{{progressDisplay}}">
                        <span class="time">{{formattedProgress}}</span>
                        <div class="progress-track">
                            <div class="progress-fill"></div>
                        </div>
                        <span class="time">{{formattedDuration}}</span>
                    </div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
